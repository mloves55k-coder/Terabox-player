<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeraBox Player v3</title>
    <style>
        body { background: #121212; color: #fff; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { max-width: 500px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 12px; }
        input { width: 90%; padding: 12px; border-radius: 8px; border: none; margin-bottom: 10px; }
        button { width: 95%; padding: 12px; background: #ff0050; color: #fff; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        video { width: 100%; margin-top: 20px; border-radius: 10px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>TeraBox Streamer</h2>
        <input type="text" id="url" placeholder="Paste link here...">
        <button onclick="play()">Stream Now</button>
        <p id="status"></p>
        <video id="player" controls></video>
    </div>

    <script>
        async function play() {
            const url = document.getElementById('url').value;
            const status = document.getElementById('status');
            const player = document.getElementById('player');
            
            if(!url) return;
            status.innerHTML = "Fetching video link...";
            player.style.display = "none";

            try {
                const res = await fetch(`/api?url=${encodeURIComponent(url)}`);
                const data = await res.json();
                
                if(data.stream_url) {
                    status.innerHTML = "Video Found! Loading...";
                    player.src = data.stream_url;
                    player.style.display = "block";
                    player.play();
                } else {
                    status.innerHTML = "Error: Link could not be bypassed.";
                }
            } catch (e) {
                status.innerHTML = "Server error. Check your Vercel logs.";
            }
        }
    </script>
</body>
</html>
