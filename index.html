<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeraBox Player - Stream & Download</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>TeraBox <span>Player</span></h1>
            <p>Paste your link and enjoy ad-free streaming</p>
        </header>

        <div class="input-section">
            <input type="text" id="teralink" placeholder="https://terabox.com/s/1xxxxxxx">
            <button id="playBtn">Play Now</button>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Extracting direct link from server...</p>
        </div>

        <div id="player-card" class="player-card">
            <div class="video-wrapper">
                <video id="mainPlayer" controls poster="https://via.placeholder.com/640x360?text=TeraBox+Player"></video>
            </div>
            <h3 id="videoTitle">Video Filename</h3>
            <div class="action-buttons">
                <a id="downloadBtn" href="#" target="_blank" class="download-btn">Download Video</a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
