<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeraBox Ultra Player</title>
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        .vjs-matrix.video-js { color: #00ff00; }
        #my-video { width: 100%; max-width: 600px; margin: 20px auto; border-radius: 10px; display:none; }
        input { width: 80%; padding: 12px; margin: 10px; border-radius: 5px; border: none; }
        button { padding: 12px 25px; background: #e91e63; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h2>TeraBox Player v3</h2>
    <input type="text" id="link" placeholder="Paste link here...">
    <button onclick="startStream()">Stream Now</button>
    
    <div id="video-wrapper">
        <video id="my-video" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto"></video>
    </div>
    <p id="msg"></p>

    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
    <script>
        async function startStream() {
            const link = document.getElementById('link').value;
            const msg = document.getElementById('msg');
            const videoElement = document.getElementById('my-video');
            if(!link) return;

            msg.innerHTML = "Fetching secure stream...";
            try {
                // Hum aapki banayi hui API ko call karenge jo Parrot backend use karegi
                const res = await fetch(`/api?url=${encodeURIComponent(link)}`);
                const data = await res.json();
                
                if(data.stream_url) {
                    msg.innerHTML = "Video Found! Loading...";
                    videoElement.style.display = "block";
                    const player = videojs('my-video');
                    player.src({ type: 'video/mp4', src: data.stream_url });
                    player.play();
                } else {
                    msg.innerHTML = "Error: Stream link not accessible.";
                }
            } catch (e) {
                msg.innerHTML = "Server Busy. Try again.";
            }
        }
    </script>
</body>
</html>
