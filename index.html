<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeraBox Premium Player</title>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; text-align: center; padding: 20px; }
        .box { max-width: 600px; margin: auto; background: #1a1a1a; padding: 25px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        input { width: 90%; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #222; color: white; margin-bottom: 15px; }
        button { width: 95%; padding: 15px; background: #ffcc00; color: black; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #video-frame { margin-top: 20px; width: 100%; height: 350px; border-radius: 10px; display: none; border: 1px solid #444; }
    </style>
</head>
<body>
    <div class="box">
        <h2>TeraBox Player</h2>
        <input type="text" id="urlInput" placeholder="Paste TeraBox Link Here...">
        <button onclick="playNow()">Stream Now</button>
        <iframe id="video-frame" allowfullscreen></iframe>
        <p id="status" style="margin-top:15px; color:#888;">Enter link to play</p>
    </div>

    <script>
        function playNow() {
            let url = document.getElementById('urlInput').value;
            let frame = document.getElementById('video-frame');
            let status = document.getElementById('status');
            
            if(!url) return alert("Link toh dalein!");

            // TeraBox Direct Streamer service ka istemal
            // Ye method zyada stable hai kyunki ye direct link ko video mein badalta hai
            let streamUrl = "https://terabox.com/sharing/embed?surl=" + url.split("/s/")[1];
            
            // Alternately, agar official embed kaam na kare toh bypasser:
            // let streamUrl = "https://www.terabox.app/sharing/embed?surl=" + url.split("/s/")[1];

            frame.src = streamUrl;
            frame.style.display = "block";
            status.innerHTML = "Trying to load video player...";
        }
    </script>
</body>
</html>
