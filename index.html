<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeraBox Player Pro</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        input { width: 85%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; outline: none; }
        button { padding: 12px 25px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        #player { margin-top: 20px; min-height: 200px; display: flex; align-items: center; justify-content: center; background: #000; border-radius: 10px; }
        video { width: 100%; border-radius: 10px; }
        .error { color: #ff4444; font-weight: bold; }
    </script>
</head>
<body>
    <h1>TeraBox Player</h1>
    <input type="text" id="videoUrl" placeholder="Paste TeraBox Link Here...">
    <br>
    <button onclick="playVideo()">Play Video</button>
    <div id="player">Video will appear here...</div>

    <script>
        async function playVideo() {
            const url = document.getElementById('videoUrl').value;
            const container = document.getElementById('player');
            if(!url) return alert("Please paste a link first!");
            
            container.innerHTML = "<p>Extracting video link... Please wait.</p>";
            
            try {
                // Hum aapki apni Vercel API use kar rahe hain
                const response = await fetch(`/api?url=${encodeURIComponent(url)}`);
                const data = await response.json();
                
                // Extracting link from data
                const streamUrl = data.stream_url || (data.list && data.list[0] ? data.list[0].main_url : null);
                
                if(streamUrl) {
                    container.innerHTML = `<video controls autoplay src="${streamUrl}"></video>`;
                } else {
                    container.innerHTML = `<p class="error">Error: Could not extract link. The API might be down or link is invalid.</p>`;
                }
            } catch (e) {
                container.innerHTML = `<p class="error">Error: Connection failed.</p>`;
            }
        }
    </script>
</body>
</html>
