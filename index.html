<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeraBox Player</title>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        input { width: 90%; padding: 15px; border-radius: 10px; border: none; margin-bottom: 10px; font-size: 16px; }
        button { width: 95%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #player { margin-top: 20px; width: 100%; border: 1px solid #333; min-height: 250px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
        video { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>TeraBox Player</h2>
        <input type="text" id="link" placeholder="Paste link here...">
        <button onclick="play()">Play Video</button>
        <div id="player">Video will load here</div>
    </div>

    <script>
        async function play() {
            const link = document.getElementById('link').value;
            const player = document.getElementById('player');
            if(!link) return alert("Link paste karein!");
            
            player.innerHTML = "Processing...";
            try {
                const res = await fetch(`/api?url=${encodeURIComponent(link)}`);
                const data = await res.json();
                const videoUrl = data.stream_url || (data.list && data.list[0] ? data.list[0].main_url : null);
                
                if(videoUrl) {
                    player.innerHTML = `<video src="${videoUrl}" controls autoplay></video>`;
                } else {
                    player.innerHTML = "Error: Link not found.";
                }
            } catch (e) {
                player.innerHTML = "Error: Connection failed.";
            }
        }
    </script>
</body>
</html>
